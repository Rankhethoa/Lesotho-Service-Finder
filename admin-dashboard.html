<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

<h1>Admin Dashboard</h1>
<h3>System Stats</h3>
<p><b>Total Providers:</b> <span id="providerCount">Loading...</span></p>
<p><b>Total Visitors:</b> <span id="visitorCount">Loading...</span></p>

<h3>Registered Providers</h3>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>District</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Price Range</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="providerList"></tbody>
</table>

<script>
async function loadDashboard() {
    // Load Statistics
    const statsRes = await fetch("http://localhost:5001/api/admin/stats");
    const stats = await statsRes.json();
    document.getElementById("providerCount").textContent = stats.providerCount;
    document.getElementById("visitorCount").textContent = stats.visitorCount;

    // Load providers
    const res = await fetch("http://localhost:5001/api/admin/providers");
    const providers = await res.json();

    const tableBody = document.getElementById("providerList");
    tableBody.innerHTML = "";

    providers.forEach(provider => {
        const row = `
            <tr>
                <td>${provider.name}</td>
                <td>${provider.category}</td>
                <td>${provider.location?.district || ""}</td>
                <td>${provider.contact?.phone || ""}</td>
                <td>${provider.contact?.email || ""}</td>
                <td>${provider.priceRange}</td>
                <td>
                    <button onclick="deleteProvider('${provider._id}')">Delete</button>
                </td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });
}

async function deleteProvider(id) {
    const confirmation = confirm("Are you sure you want to delete this provider?");
    if (!confirmation) return;

    await fetch(`http://localhost:5001/api/admin/provider/${id}`, {
        method: "DELETE"
    });

    alert("Provider removed.");
    loadDashboard();
}

window.onload = loadDashboard;
</script>

</body>
</html>
